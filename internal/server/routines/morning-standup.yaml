name: "Morning Standup"
description: "Summarise yesterday's commits and today's open PRs"
enabled: false
trigger:
  mode: schedule
  cron: "0 8 * * 1-5"
agent: "Chris"
prompt: |
  Review this repository and produce a morning standup summary.
  Include:
  1. What was merged yesterday (git log --since=yesterday --oneline)
  2. Open PRs needing review (gh pr list --state open)
  3. Any failing CI on the main branch (gh run list --status failure --limit 5)
  Keep it to bullet points, readable in 60 seconds.
cost:
  max_tokens: 4096
notification:
  severity: info
  title_template: "Morning Standup — {{ .Date }}"
