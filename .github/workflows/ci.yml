name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go: build + test ─────────────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Build server (with embedded frontend)
        run: go build -tags embed_frontend -o huginn .

      - name: Run Go tests
        run: go test -race -timeout 120s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ── Windows: build + smoke test ──────────────────────────────────────────
  windows:
    name: Windows build & smoke test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: cd web && npm ci && npm run build
        shell: pwsh

      - name: Build server
        run: go build -tags embed_frontend -o huginn.exe .
        shell: pwsh

      - name: Smoke test
        run: |
          .\huginn.exe version
          .\huginn.exe help
        shell: pwsh

  # ── Playwright E2E: browser-level UI regression tests ────────────────────
  playwright-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: go
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd web && npm run test:e2e:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ── Shell script linting ──────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck install.sh
